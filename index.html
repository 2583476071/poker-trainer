<!-- shared зәҜеҮҪж•°жЁЎеқ—пјҲжҢүдҫқиө–йЎәеәҸеҠ иҪҪпјү -->

<script>
// ==================== UI жҺ§еҲ¶еҷЁ ====================

const game = new PokerGame();
const tableArea = document.getElementById('tableArea');

// еә§дҪҚеңЁжЎҢйқўдёҠзҡ„еӣәе®ҡдҪҚзҪ®пјҲCSS з”ұ style.css зҡ„ #seat-N е®ҡд№үпјү
// иҚ·е®ҳдҪҚдәҺзүҢжЎҢйЎ¶йғЁдёӯеӨ®пјҲзәҜиЈ…йҘ°пјҢдёҚеҸӮдёҺжёёжҲҸпјү
// зҺ©е®¶еӣҙз»•зүҢжЎҢ U еҪўеҲҶеёғпјҡдҪ (дёӢж–№) + 8дёӘAI(е·ҰеҸідёӨдҫ§)
const SEAT_POSITIONS = [
    { id: 'seat-0' }, // дҪ  вҖ” жӯЈдёӢж–№дёӯеӨ®
    { id: 'seat-1' }, // AI вҖ” еҸідёҠ
    { id: 'seat-2' }, // AI вҖ” еҸідҫ§дёҠ
    { id: 'seat-3' }, // AI вҖ” еҸідҫ§дёӢ
    { id: 'seat-4' }, // AI вҖ” еҸідёӢ
    { id: 'seat-5' }, // AI вҖ” е·ҰдёӢ
    { id: 'seat-6' }, // AI вҖ” е·Ұдҫ§дёӢ
    { id: 'seat-7' }, // AI вҖ” е·Ұдҫ§дёҠ
    { id: 'seat-8' }, // AI вҖ” е·ҰдёҠ
];

// еҲқе§ӢеҢ–еә§дҪҚ DOM
function initSeats() {
    const container = document.getElementById('seatsContainer');
    for (let i = 0; i < 9; i++) {
        const seat = document.createElement('div');
        seat.className = 'player-seat';
        seat.id = SEAT_POSITIONS[i].id;
        seat.innerHTML = `
            <div class="player-info" id="playerInfo${i}">
                <div class="player-name" id="playerName${i}"></div>
                <div class="player-chip" id="playerChip${i}"></div>
                <div class="player-bet" id="playerBet${i}"></div>
                <div class="player-cards" id="playerCards${i}"></div>
                <div class="seat-pos-label" id="seatLabel${i}"></div>
            </div>
        `;
        container.appendChild(seat);
    }
}

// жёІжҹ“еҚЎзүҢ HTML
function renderCard(card, faceDown) {
    if (faceDown) {
        return '<div class="mini-card face-down">?</div>';
    }
    const suitSymbol = { hearts:'вҷҘ', diamonds:'вҷҰ', clubs:'вҷЈ', spades:'вҷ ' }[card.suit];
    const isRed = card.suit === 'hearts' || card.suit === 'diamonds';
    return `<div class="mini-card ${isRed ? 'red' : ''}">
        <span>${card.rank}</span><span>${suitSymbol}</span>
    </div>`;
}

function renderBigCard(card, faceDown) {
    if (faceDown) return '<div class="card face-down"></div>';
    const suitSymbol = { hearts:'вҷҘ', diamonds:'вҷҰ', clubs:'вҷЈ', spades:'вҷ ' }[card.suit];
    const isRed = card.suit === 'hearts' || card.suit === 'diamonds';
    return `<div class="card ${isRed ? 'red' : 'black'}">
        <span class="rank">${card.rank}</span>
        <span class="suit">${suitSymbol}</span>
    </div>`;
}

// дё»жёІжҹ“еҮҪж•°
function render(state) {
    // йЎ¶ж Ҹ
    document.getElementById('handNum').textContent = `з¬¬ ${state.handNumber} жүӢ`;
    document.getElementById('gameMsg').textContent = state.message;

    // ж‘ҠзүҢйҳ¶ж®өж Үи®°пјҲжүӢжңәз«Ҝз”ЁдәҺжҳҫзӨәжүҖжңүзүҢпјү
    const isShowdown = state.phase === 'showdown' || state.phase === 'hand_over';
    tableArea.classList.toggle('showdown-phase', isShowdown);

    // зҺ©е®¶еә§дҪҚ
    for (let i = 0; i < 9; i++) {
        const p = state.players[i];
        if (!p) continue;

        const info = document.getElementById(`playerInfo${i}`);
        const nameEl = document.getElementById(`playerName${i}`);
        const chipEl = document.getElementById(`playerChip${i}`);
        const betEl = document.getElementById(`playerBet${i}`);
        const cardsEl = document.getElementById(`playerCards${i}`);
        const labelEl = document.getElementById(`seatLabel${i}`);

        // еҗҚеӯ—
        let nameHTML = p.name;
        if (p.isDealer) nameHTML += ' <span class="badge-dealer">D</span>';
        if (p.isSmallBlind) nameHTML += ' <span class="badge-sb">SB</span>';
        if (p.isBigBlind) nameHTML += ' <span class="badge-bb">BB</span>';
        if (state.currentRoundRaiserId === p.id) nameHTML += ' <span class="badge-raiser">R</span>';
        if (!p.isHuman && p.aiType && state.showAiTypes) nameHTML += ` <span class="badge-ai">${p.aiType}</span>`;
        nameEl.innerHTML = nameHTML;
        if (p.isHuman) nameEl.classList.add('human');
        else nameEl.classList.remove('human');

        // зӯ№з Ғ + BBж•°
        const bbCount = Math.round(p.chips / state.bigBlind);
        chipEl.textContent = `${p.chips}пјҲ${bbCount}BBпјү`;

        // еҪ“еүҚдёӢжіЁпјҲеҪ©иүІпјү
        if (p.totalBetThisHand > 0) {
            betEl.textContent = `рҹ’ө ${p.totalBetThisHand}`;
            betEl.style.color = '#2ecc71';
            betEl.style.fontWeight = 'bold';
        } else {
            betEl.textContent = '';
            betEl.style.color = '';
            betEl.style.fontWeight = '';
        }

        // жүӢзүҢ
        if (p.isEliminated) {
            cardsEl.innerHTML = '';
        } else if (state.phase === 'hand_over' || state.phase === 'showdown') {
            // еҜ№еұҖз»“жқҹ/ж‘ҠзүҢпјҡе…ЁйғЁдә®зүҢпјҲдёҚз®ЎжҳҜеҗҰејғзүҢпјү
            if (p.handCards.length === 2) {
                cardsEl.innerHTML = renderCard(p.handCards[0], false) + renderCard(p.handCards[1], false);
            } else {
                cardsEl.innerHTML = renderCard(null, true) + renderCard(null, true);
            }
        } else if (p.isFolded) {
            cardsEl.innerHTML = renderCard(null, true) + renderCard(null, true);
        } else if (p.isHuman) {
            // зңҹдәәжҖ»жҳҜиғҪзңӢеҲ°иҮӘе·ұзҡ„зүҢ
            if (p.handCards.length === 2) {
                cardsEl.innerHTML = renderCard(p.handCards[0], false) + renderCard(p.handCards[1], false);
            }
        } else {
            // AI: жҡ—зүҢ
            if (p.isActive && !p.isEliminated) {
                cardsEl.innerHTML = renderCard(null, true) + renderCard(null, true);
            } else {
                cardsEl.innerHTML = '';
            }
        }

        // зҠ¶жҖҒж ·ејҸ
        info.classList.remove('current-turn', 'folded', 'eliminated');
        if (p.isEliminated) info.classList.add('eliminated');
        else if (p.isFolded) info.classList.add('folded');
        // еҪ“еүҚиЎҢеҠЁзҺ©е®¶й«ҳдә®пјҲйқһзңҹдәәж—¶д№ҹжҳҫзӨәпјү
        if (i === game.currentPlayerIndex && state.phase !== 'hand_over' && state.phase !== 'idle' && state.phase !== 'game_over') {
            // еҸӘеңЁжёёжҲҸиҝӣиЎҢдёӯй«ҳдә®пјҢдёҚйўқеӨ–еӨ„зҗҶпјҲе·ІйҖҡиҝҮ player-seat ж ·ејҸпјү
        }

        // еә§дҪҚж Үзӯҫ
        labelEl.textContent = '';
    }

    // й«ҳдә®еҪ“еүҚиЎҢеҠЁзҺ©е®¶
    // з§»йҷӨжүҖжңүй«ҳдә®
    for (let i = 0; i < 9; i++) {
        const info = document.getElementById(`playerInfo${i}`);
        info.classList.remove('current-turn');
    }
    // ж·»еҠ еҪ“еүҚзҺ©е®¶й«ҳдә®
    if (state.phase !== 'hand_over' && state.phase !== 'idle' && state.phase !== 'game_over' && game.currentPlayerIndex >= 0) {
        const currentInfo = document.getElementById(`playerInfo${game.currentPlayerIndex}`);
        if (currentInfo) currentInfo.classList.add('current-turn');
    }

    // е…¬е…ұзүҢ
    const commDiv = document.getElementById('communityCards');
    let commHTML = '';
    for (let i = 0; i < 5; i++) {
        if (i < state.communityCards.length) {
            commHTML += renderBigCard(state.communityCards[i], false);
        } else {
            commHTML += '<div class="card-placeholder"></div>';
        }
    }
    commDiv.innerHTML = commHTML;

    // еә•жұ 
    document.getElementById('potDisplay').textContent = `еә•жұ : ${state.pot}`;
    document.getElementById('blindDisplay').textContent = `${state.smallBlind}/${state.bigBlind}`;

    // дҪ зҡ„жүӢзүҢпјҲеӨ§еӣҫпјү
    const yourHandDiv = document.getElementById('yourHand');
    const human = state.players[0];
    if (human && human.handCards && human.handCards.length === 2) {
        yourHandDiv.innerHTML = renderBigCard(human.handCards[0], false) + renderBigCard(human.handCards[1], false);
    } else {
        yourHandDiv.innerHTML = '';
    }

    // дҪ зҡ„зӯ№з Ғ
    document.getElementById('yourChips').textContent = `з§ҜеҲҶ: ${state.humanChips}`;

    // дҪ зҡ„еҪ“еүҚдёӢжіЁ
    if (human && human.totalBetThisHand > 0) {
        document.getElementById('yourBet').textContent = `е·ІдёӢ: ${human.totalBetThisHand}`;
    } else {
        document.getElementById('yourBet').textContent = '';
    }

    // зүҢеһӢжҸҗзӨәпјҲзҝ»зүҢеҗҺжҳҫзӨәеҪ“еүҚжңҖдјҳзүҢеһӢпјү
    const hintDiv = document.getElementById('handHint');
    if (state.phase !== 'preflop' && state.phase !== 'idle' && state.phase !== 'hand_over' && state.phase !== 'game_over' && human.handCards.length === 2 && state.communityCards.length >= 3) {
        const all7 = [...human.handCards, ...state.communityCards];
        const evalResult = evaluateHand(all7);
        hintDiv.textContent = `еҪ“еүҚзүҢеһӢ: ${evalResult.name}`;
    } else if (state.phase === 'hand_over' && human.handCards && human.handCards.length === 2 && state.communityCards.length >= 3) {
        const all7 = [...human.handCards, ...state.communityCards];
        const evalResult = evaluateHand(all7);
        const won = state.winners.find(w => w.isHuman && w.pot > 0);
        hintDiv.textContent = `жңҖз»ҲзүҢеһӢ: ${evalResult.name}` + (won ? ' вң… иөўдәҶ!' : (state.winners.some(w => w.isHuman) ? '' : ' вҖ” иҫ“дәҶ'));
    } else {
        hintDiv.textContent = '';
    }

    // иЎҢеҠЁжҢүй’®
    updateButtons(state);

    // иЎҢеҠЁж—Ҙеҝ—
    updateActionLog(state);

    // ж‘ҠзүҢйқўжқҝ
    updateShowdownPanel(state);

    // з»“жһңеј№зӘ—
    updateResultOverlay(state);
}

function updateButtons(state) {
    const btns = {
        fold: document.getElementById('btnFold'),
        check: document.getElementById('btnCheck'),
        call: document.getElementById('btnCall'),
        raise100: document.getElementById('btnRaise100'),
        raise150: document.getElementById('btnRaise150'),
        raise200: document.getElementById('btnRaise200'),
        allIn: document.getElementById('btnAllIn'),
        next: document.getElementById('btnNext'),
    };

    Object.values(btns).forEach(b => b.classList.add('hidden'));

    if (state.isGameOver) return;

    if (state.phase === 'hand_over') {
        btns.next.classList.remove('hidden');
        return;
    }

    if (state.isHumanTurn) {
        const actions = state.availableActions;
        if (actions.includes('fold')) btns.fold.classList.remove('hidden');
        if (actions.includes('check')) btns.check.classList.remove('hidden');
        if (actions.includes('call')) {
            btns.call.classList.remove('hidden');
            const toCall = game.currentBetLevel - game.players[0].currentBet;
            btns.call.textContent = 'и·ҹжіЁ ' + toCall;
        }
        if (actions.includes('raise_100')) btns.raise100.classList.remove('hidden');
        if (actions.includes('raise_150')) btns.raise150.classList.remove('hidden');
        if (actions.includes('raise_200')) btns.raise200.classList.remove('hidden');
        if (actions.includes('allin')) btns.allIn.classList.remove('hidden');
    }
}

function updateResultOverlay(state) {
    const overlay = document.getElementById('resultOverlay');
    const box = document.getElementById('resultBox');
    const title = document.getElementById('resultTitle');
    const list = document.getElementById('winnerList');

    if (!state.isGameOver) {
        overlay.classList.add('hidden');
        return;
    }

    // ===== жёёжҲҸз»“жқҹпјҡеҶ еҶӣз»“з®—еҠЁз”» =====
    overlay.classList.remove('hidden');

    const humanWon = state.humanChips > 0;
    const account = PokerGame.loadAccount();
    const stats = account ? account.stats : null;

    // жё…з©әж—§еҶ…е®№
    list.innerHTML = '';

    if (humanWon) {
        box.className = 'champion';
        title.innerHTML = 'рҹҸҶ еҶ еҶӣпјҒ';
        list.innerHTML = `
            <span class="trophy">рҹҸҶ</span>
            <div class="stats-summary">
                <div>рҹҺҜ <span class="highlight">${stats ? stats.totalHands : '?'} жүӢ</span> жҲҳиғңжүҖжңү AI</div>
                <div>рҹ“Ҳ зҙҜи®ЎзӣҲеҲ© <span class="highlight">${stats ? (stats.profit >= 0 ? '+' : '') + stats.profit : '?'}</span></div>
                <div>рҹ“Ҡ иғңзҺҮ <span class="highlight">${stats ? stats.winRate + '%' : '?'}</span></div>
                <div>рҹ’° жңҖеӨ§еә•жұ  <span class="highlight">${stats ? stats.biggestPot : '?'}</span></div>
            </div>
        `;
    } else {
        box.className = 'defeat';
        title.innerHTML = 'рҹҳһ дҪ иў«ж·ҳжұ°дәҶ';
        list.innerHTML = `
            <span class="trophy">рҹ’Җ</span>
            <div class="stats-summary">
                <div>рҹҺҜ е…ұжү“дәҶ <span class="highlight">${stats ? stats.totalHands : '?'} жүӢ</span></div>
                <div>рҹ“Ҳ жңҖз»Ҳз§ҜеҲҶ <span class="highlight" style="color:#e74c3c;">${state.humanChips}</span></div>
                <div>рҹ“Ҡ иғңзҺҮ <span class="highlight">${stats ? stats.winRate + '%' : '?'}</span></div>
            </div>
        `;
    }

    // йҮҚж–°з»‘е®ҡжҢүй’®
    const btn = document.getElementById('btnNextHand');
    btn.textContent = humanWon ? 'рҹҸҶ еҶҚжқҘдёҖеұҖ' : 'рҹ”„ йҮҚж–°ејҖе§Ӣ';
    btn.onclick = () => {
        overlay.classList.add('hidden');
        PokerGame.clearSave();
        location.reload();
    };
}

// ===== иЎҢеҠЁж—Ҙеҝ— =====
const actionLogEl = document.getElementById('actionLog');
const logEntries = [];
function updateActionLog(state) {
    if (!state.lastAction) return;
    const a = state.lastAction;
    // еҺ»йҮҚпјҲеҗҢдёҖеҠЁдҪңдёҚйҮҚеӨҚи®°еҪ•пјү
    const key = `${a.playerId}-${a.action}-${state.handNumber}-${state.phase}`;
    if (logEntries.includes(key)) return;
    logEntries.push(key);
    if (logEntries.length > 50) logEntries.shift();

    let cls = 'action-' + a.action;
    let icon = { fold:'вң—', check:'вң“', call:'вҶ’', raise:'вҶ‘', allin:'вҡЎ' }[a.action] || '';
    let detail = a.amount > 0 ? ` ${a.amount}` : '';
    actionLogEl.innerHTML += `<div class="entry"><span class="player">${a.playerName}</span> <span class="${cls}">${icon}${a.action === 'allin' ? 'All-in' : (a.action === 'raise' ? 'еҠ жіЁ' : (a.action === 'call' ? 'и·ҹжіЁ' : (a.action === 'fold' ? 'ејғзүҢ' : 'иҝҮзүҢ')))}${detail}</span></div>`;
    actionLogEl.scrollTop = actionLogEl.scrollHeight;
}

// ===== ж‘ҠзүҢйқўжқҝ =====
function updateShowdownPanel(state) {
    const panel = document.getElementById('showdownPanel');
    if (state.phase !== 'hand_over' || state.winners.length === 0) {
        panel.classList.add('hidden');
        return;
    }
    panel.classList.remove('hidden');

    // ж Үйўҳ
    document.getElementById('sdTitle').textContent = 'рҹғҸ ж‘ҠзүҢз»“жһң';

    // е…¬е…ұзүҢ
    let pubHTML = '';
    for (const c of state.communityCards) {
        const suitSymbol = { hearts:'вҷҘ', diamonds:'вҷҰ', clubs:'вҷЈ', spades:'вҷ ' }[c.suit];
        const isRed = c.suit === 'hearts' || c.suit === 'diamonds';
        pubHTML += `<div class="card ${isRed ? 'red' : 'black'}"><span class="rank">${c.rank}</span><span class="suit">${suitSymbol}</span></div>`;
    }
    document.getElementById('sdPubcards').innerHTML = pubHTML;

    // зҺ©е®¶еҚЎзүҮ
    const activePlayers = state.players.filter(p => !p.isEliminated && !p.isFolded);
    // жҢүжүӢзүҢејәеәҰжҺ’еәҸ
    const ranked = activePlayers.map(p => {
        const w = state.winners.find(w => w.playerId === p.id || w.name === p.name);
        const handName = w && w.handName ? w.handName : 'вҖ”';
        const pot = w ? w.pot : 0;
        return { ...p, handName, pot, isWinner: pot > 0 };
    }).sort((a, b) => b.pot - a.pot);

    document.getElementById('sdPlayers').innerHTML = ranked.map(p => `
        <div class="sd-player-card ${p.isWinner ? 'winner' : ''}">
            <div class="sd-name">${p.isWinner ? 'рҹҸҶ ' : ''}${p.name}${p.isHuman ? ' рҹ‘Ө' : ''}</div>
            <div class="sd-cards">${p.handCards.map(c => {
                const s = { hearts:'вҷҘ', diamonds:'вҷҰ', clubs:'вҷЈ', spades:'вҷ ' }[c.suit];
                const r = c.suit === 'hearts' || c.suit === 'diamonds' ? 'red' : '';
                return `<span style="color:${r ? '#e74c3c' : '#2c3e50'}">${c.rank}${s}</span>`;
            }).join(' ')}</div>
            <div class="sd-handname">гҖҗ${p.handName}гҖ‘</div>
            <div class="sd-result">
                ${p.isWinner ? `<span class="sd-win">+${p.pot}</span>` : `<span class="sd-lose">вҖ”</span>`}
            </div>
        </div>
    `).join('');

    // еә•жұ 
    document.getElementById('sdPot').textContent = `еә•жұ : ${state.pot}`;

    // дёӢдёҖеұҖжҢүй’®
    document.getElementById('sdNextBtn').onclick = () => {
        panel.classList.add('hidden');
        logEntries.length = 0;
        actionLogEl.innerHTML = '';
        game.nextHand();
    };
}

// ===== жҢүй’®дәӢд»¶ =====
document.getElementById('btnFold').addEventListener('click', () => game.humanAction('fold'));
document.getElementById('btnCheck').addEventListener('click', () => game.humanAction('check'));
document.getElementById('btnCall').addEventListener('click', () => game.humanAction('call'));
document.getElementById('btnRaise100').addEventListener('click', () => game.humanAction('raise', 2.0));
document.getElementById('btnRaise150').addEventListener('click', () => game.humanAction('raise', 2.5));
document.getElementById('btnRaise200').addEventListener('click', () => game.humanAction('raise', 3.0));
document.getElementById('btnAllIn').addEventListener('click', () => game.humanAction('allin'));
document.getElementById('btnNext').addEventListener('click', () => {
    logEntries.length = 0;
    actionLogEl.innerHTML = '';
    game.nextHand();
});
document.getElementById('btnNextHand').addEventListener('click', () => {
    document.getElementById('resultOverlay').classList.add('hidden');
    game.nextHand();
});

// ===== жҲҳз»©йқўжқҝжӣҙж–° =====
function updateStatsPanel() {
    const panel = document.getElementById('statsPanel');
    if (!game.account) { panel.innerHTML = ''; return; }
    const s = game.account.stats;
    const profitColor = s.profit >= 0 ? '#4fc3f7' : '#e74c3c';
    const profitSign = s.profit >= 0 ? '+' : '';
    panel.innerHTML = `<span style="color:#f0c040;">${game.account.nickname}</span>
        <span style="color:${profitColor}; margin-left:8px;">${profitSign}${s.profit}</span>
        <span style="color:#aaa; margin-left:6px; font-size:10px;">${s.totalHands}жүӢ ${s.winRate}%иғң</span>`;
}

// ===== жҳөз§°жөҒзЁӢ =====
function initNickname() {
    const overlay = document.getElementById('nicknameOverlay');
    const input = document.getElementById('nicknameInput');
    const inputP = input.previousElementSibling; // <p>иҫ“е…Ҙжҳөз§°ејҖе§ӢжёёжҲҸ</p>
    const btn = document.getElementById('btnStartGame');
    const hint = document.getElementById('modeHint');

    // жЁЎејҸйҖүжӢ©
    let selectedMode = 'training';
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedMode = this.dataset.mode;
            hint.classList.toggle('hidden', selectedMode === 'training');
            hint.textContent = selectedMode === 'competitive' ? 'AIжҖ§ж јйҡҗи—ҸпјҢд»…ж‘ҠзүҢж—¶дә®зүҢ' : '';
        });
    });

    const existing = PokerGame.loadAccount();
    if (existing) {
        // е·ІжңүиҙҰеҸ· вҶ’ жҳҫзӨәжЁЎејҸйҖүжӢ©пјҲжҳөз§°йў„еЎ«йҡҗи—Ҹпјү
        game.setNickname(existing.nickname);
        input.style.display = 'none';
        inputP.textContent = 'ж¬ўиҝҺеӣһжқҘпјҢ' + existing.nickname + 'пјҒйҖүжӢ©жЁЎејҸ';
        overlay.style.display = 'flex';
        btn.addEventListener('click', () => {
            overlay.style.display = 'none';
            checkSavedGame(selectedMode);
        });
        return;
    }

    // ж–°з”ЁжҲ· вҶ’ жҳҫзӨәжҳөз§°иҫ“е…Ҙ + жЁЎејҸйҖүжӢ©
    overlay.style.display = 'flex';
    btn.addEventListener('click', () => {
        const name = input.value.trim() || 'зҺ©е®¶';
        game.setNickname(name);
        overlay.style.display = 'none';
        checkSavedGame(selectedMode);
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') btn.click();
    });
}

// ===== еӯҳжЎЈжҒўеӨҚ =====
function checkSavedGame(mode) {
    const selectedMode = mode || 'training';
    const save = PokerGame.loadGame();
    if (!save) { startGame(false, selectedMode); return; }

    const overlay = document.getElementById('resumeOverlay');
    const info = document.getElementById('resumeInfo');
    const mins = Math.round((Date.now() - save.timestamp) / 60000);
    info.textContent = `з¬¬ ${save.handNumber} жүӢ В· еә•жұ  ${save.pot} В· ${mins} еҲҶй’ҹеүҚ`;

    overlay.classList.remove('hidden');
    document.getElementById('btnResume').onclick = () => {
        overlay.classList.add('hidden');
        startGame(true, selectedMode);
    };
    document.getElementById('btnNewGame').onclick = () => {
        overlay.classList.add('hidden');
        PokerGame.clearSave();
        startGame(false, selectedMode);
    };
}

// ===== еҗҜеҠЁжёёжҲҸ =====
function startGame(resume, mode) {
    try {
        initSeats();
        if (resume) {
            const save = PokerGame.loadGame();
            if (save) {
                game.init(save.gameMode || 'training'); // еҲқе§ӢеҢ–еҹәжң¬з»“жһ„
                game.restoreFromSave(save);
                updateStatsPanel();
                console.log('Game restored from save. Phase:', game.phase, 'Hand:', game.handNumber);
                document.getElementById('gameMsg').textContent = 'зүҢеұҖе·ІжҒўеӨҚ вҖ” иҪ®еҲ°дҪ дәҶ';
                return;
            }
        }
        game.init(mode || 'training');
        updateStatsPanel();
        console.log('Game initialized. Phase:', game.phase, 'Hand:', game.handNumber);
        document.getElementById('gameMsg').textContent = 'жёёжҲҸе·ІеҗҜеҠЁ вҖ” и§ӮеҜҹAIиЎҢеҠЁдёӯ...';
    } catch(e) {
        document.getElementById('gameMsg').textContent = 'еҗҜеҠЁй”ҷиҜҜ: ' + e.message;
        document.getElementById('gameMsg').style.color = '#e74c3c';
        console.error(e);
    }
}

// ===== й”ҷиҜҜеӨ„зҗҶ =====
window.onerror = function(msg, url, line) {
    document.getElementById('gameMsg').textContent = 'JSй”ҷиҜҜ: ' + msg + ' (иЎҢ' + line + ')';
    document.getElementById('gameMsg').style.color = '#e74c3c';
};

// ===== еҗҜеҠЁ =====
try {
    game.onStateChange = function(state) {
        try {
            render(state);
            updateStatsPanel();
        } catch(e) {
            document.getElementById('gameMsg').textContent = 'жёІжҹ“й”ҷиҜҜ: ' + e.message;
            document.getElementById('gameMsg').style.color = '#e74c3c';
            console.error(e);
        }
    };
    initNickname();
} catch(e) {
    document.getElementById('gameMsg').textContent = 'еҗҜеҠЁй”ҷиҜҜ: ' + e.message;
    document.getElementById('gameMsg').style.color = '#e74c3c';
    console.error(e);
}
</script>
