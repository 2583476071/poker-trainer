<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德州扑克 — 联机对战</title>
<link rel="stylesheet" href="../style.css">
<style>
    /* ===== 大厅样式 ===== */
    #lobbyPanel {
        max-width: 500px; margin: 60px auto; padding: 32px;
        background: #16213e; border-radius: 12px; text-align: center;
    }
    #lobbyPanel h2 { color: #4fc3f7; margin-bottom: 20px; }
    #lobbyPanel input {
        font-size: 16px; padding: 10px 14px; margin: 6px;
        background: #0a0a1a; color: #eee; border: 1px solid #333;
        border-radius: 6px; width: 200px; text-align: center;
    }
    #lobbyPanel input::placeholder { color: #555; }
    #lobbyPanel button {
        font-size: 16px; padding: 10px 24px; margin: 6px;
        background: #0f3460; color: #eee; border: none;
        border-radius: 6px; cursor: pointer;
    }
    #lobbyPanel button:hover { background: #1a5080; }
    #lobbyPanel button.primary { background: #2d6a4f; }
    #lobbyPanel button.primary:hover { background: #40916c; }
    #lobbyPanel button.danger { background: #9b2226; }
    #lobbyPanel button.danger:hover { background: #ae2012; }
    .room-code-display {
        font-size: 36px; color: #f0c040; letter-spacing: 6px;
        padding: 16px; font-family: monospace;
    }
    #playerList { margin: 12px 0; text-align: left; }
    .lobby-player {
        padding: 6px 10px; margin: 4px 0;
        background: #0a0a1a; border-radius: 4px;
        display: flex; justify-content: space-between; align-items: center;
    }
    #lobbyStatus { color: #888; margin: 8px 0; font-size: 14px; }
    .hidden { display: none !important; }
    .notice {
        margin-top: 16px; padding: 8px; background: #1a1a2e;
        border-radius: 4px; font-size: 12px; color: #888;
    }
    .notice a { color: #4fc3f7; }
</style>
</head>
<body>

<div id="app">

    <!-- 顶栏 -->
    <div id="topBar">
        <span class="hand-num" id="handNum">联机对战</span>
        <span class="game-msg" id="gameMsg">欢迎！创建或加入房间开始游戏</span>
    </div>

    <!-- 大厅 -->
    <div id="lobbyPanel">
        <h2>🃏 联机对战</h2>
        <input type="text" id="inputNickname" placeholder="你的昵称" maxlength="8" value="玩家">
        <div id="createJoinRow">
            <button class="primary" id="btnCreateRoom">创建房间</button>
            <br>
            <input type="text" id="inputRoomCode" placeholder="房间码" maxlength="6" style="width:100px">
            <button id="btnJoinRoom">加入房间</button>
        </div>
        <div class="room-code-display" id="lobbyRoomCode"></div>
        <div id="lobbyStatus"></div>
        <div id="playerList"></div>
        <button class="primary hidden" id="btnStartGame">开始游戏</button>
        <button class="danger hidden" id="btnLeaveRoom">离开房间</button>
        <div class="notice">
            朋友输入房间码即可加入 | AI 自动填充空位<br>
            <a href="../">← 返回单人模式</a>
        </div>
    </div>

    <!-- 牌桌（初始隐藏） -->
    <div id="tableArea" class="hidden">
        <div id="dealerSpot">
            <div class="dealer-icon">🃏</div>
            <div class="dealer-label">荷官</div>
        </div>
        <div id="communityCards"></div>
        <div id="potDisplay">底池: 0</div>
        <div id="blindDisplay">100/200</div>
        <div id="seatsContainer"></div>
    </div>

    <!-- 底部操作区（初始隐藏） -->
    <div id="actionBar" class="hidden">
        <div id="yourInfo">
            <div id="yourHand"></div>
            <div id="handHint"></div>
            <div id="yourChips">积分: 20000</div>
            <div id="yourBet"></div>
        </div>
        <div id="actionButtons">
            <button class="btn-fold" id="btnFold">弃牌</button>
            <button class="btn-check" id="btnCheck">过牌</button>
            <button class="btn-call" id="btnCall">跟注</button>
            <button class="btn-raise" id="btnRaise100">+100%</button>
            <button class="btn-raise" id="btnRaise150">+150%</button>
            <button class="btn-raise" id="btnRaise200">+200%</button>
            <button class="btn-allin" id="btnAllIn">All-in</button>
            <button class="btn-next hidden" id="btnNext">下一局 ▶</button>
        </div>
    </div>
</div>

<!-- 结果弹窗 -->
<div id="resultOverlay" class="hidden">
    <div id="resultBox">
        <h2 id="resultTitle"></h2>
        <div class="winner-list" id="winnerList"></div>
        <button id="btnNextHand">下一局 ▶</button>
    </div>
</div>

<!-- 脚本加载 -->
<script src="/socket.io/socket.io.js"></script>
<script src="../shared/constants.js"></script>
<script src="../shared/deck.js"></script>
<script src="../shared/hand_evaluator.js"></script>
<script src="../shared/pot_calculator.js"></script>
<script src="../shared/gto_ranges.js"></script>
<script src="../shared/player_factory.js"></script>
<script src="../shared/board_analyzer.js"></script>
<script src="network.js"></script>
<script src="lobby.js"></script>
<script src="renderer.js"></script>

<script>
// ===== 主入口 =====
document.addEventListener('DOMContentLoaded', () => {
    Lobby.init();
    Renderer.initSeats();
    Network.connect();

    // 房间状态更新
    Network.on('roomState', (roomState) => {
        Lobby.updatePlayerList(roomState);
    });

    // 游戏开始 → 隐藏大厅，显示牌桌
    Network.on('gameStarting', () => {
        Lobby.hide();
    });

    // 游戏状态更新 → 渲染牌桌
    Network.on('stateUpdate', (state) => {
        Renderer.render(state);
    });

    // 游戏结束
    Network.on('gameOver', (results) => {
        document.getElementById('gameMsg').textContent = '游戏结束！';
    });

    // 断线
    Network.on('disconnect', () => {
        document.getElementById('gameMsg').textContent = '⚠️ 连接断开，请刷新页面';
    });

    Network.on('error', (err) => {
        alert('错误: ' + err.message);
    });
});

// ===== 按钮事件 =====
document.getElementById('btnFold').addEventListener('click', () => Network.sendAction('fold'));
document.getElementById('btnCheck').addEventListener('click', () => Network.sendAction('check'));
document.getElementById('btnCall').addEventListener('click', () => Network.sendAction('call'));
document.getElementById('btnRaise100').addEventListener('click', () => Network.sendAction('raise', 2.0));
document.getElementById('btnRaise150').addEventListener('click', () => Network.sendAction('raise', 2.5));
document.getElementById('btnRaise200').addEventListener('click', () => Network.sendAction('raise', 3.0));
document.getElementById('btnAllIn').addEventListener('click', () => Network.sendAction('allin'));
document.getElementById('btnNext').addEventListener('click', () => Network.nextHand());
</script>

</body>
</html>
